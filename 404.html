<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Page Not Found</title>
    <script>
        (function() {
            let path = window.location.pathname;
            const validPages = ['/privacy-policy', '/about', '/contact'];
            for (let page of validPages) {
                if (path.includes(page)) {
                    if (path !== page) {
                        window.location.replace(page + window.location.search);
                        return;
                    }
                }
            }
        })();
    </script>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header class="header"></header>
    
    <main class="main-content container floating-404" style="display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
        
        <div class="lang-en">
            <h1 style="font-size: 140px; color: var(--primary-light); font-weight: 900; line-height: 1; margin-bottom: 0; text-shadow: 0 8px 16px rgba(0,0,0,0.6);">404</h1>
            <h2 style="margin-top: 0; border-bottom: none; justify-content: center; font-size: 32px; color: #fff;">Page Not Found</h2>
            <p style="margin: 16px auto 40px; font-size: 18px;">The page you are looking for does not exist or has been relocated permanently.</p>
        </div>

        <div class="lang-ar">
            <h1 style="font-size: 140px; color: var(--primary-light); font-weight: 900; line-height: 1; margin-bottom: 0; text-shadow: 0 8px 16px rgba(0,0,0,0.6);">404</h1>
            <h2 style="margin-top: 0; border-bottom: none; justify-content: center; font-size: 32px; color: #fff;">الصفحة غير موجودة</h2>
            <p style="margin: 16px auto 40px; font-size: 18px;">الصفحة التي تحاول الوصول إليها غير موجودة أو تم نقلها بشكل دائم.</p>
        </div>
        
        <a href="/" class="btn-premium" style="padding: 18px 48px;">
            <span class="lang-en">Return Home</span>
            <span class="lang-ar">العودة للرئيسية</span>
        </a>
    </main>

    <footer class="footer"></footer>
    <script src="assets/js/core.js"></script>
</body>
</html>
